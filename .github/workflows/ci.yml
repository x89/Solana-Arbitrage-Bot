name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Rust 1.89 quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.89.0
          components: clippy,rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo +1.89.0 fmt --all -- --check

      - name: Check all targets
        run: cargo +1.89.0 check --workspace --all-targets --all-features --locked

      - name: Run all tests
        run: cargo +1.89.0 test --workspace --all-targets --all-features --locked

      - name: Run strict Clippy
        run: cargo +1.89.0 clippy --workspace --all-targets --all-features --locked -- -D warnings

  stable:
    name: Latest stable compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: stable

      - run: cargo +stable check --workspace --all-targets --all-features --locked
      - run: cargo +stable test --workspace --all-targets --all-features --locked

  dependency-policy:
    name: Dependency and license policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: RustSec audit
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Scan repository history
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
