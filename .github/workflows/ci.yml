name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 0"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Rust 1.89 quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master, 2026-07-16
        with:
          toolchain: 1.89.0
          components: clippy,rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Check formatting
        run: cargo +1.89.0 fmt --all -- --check

      - name: Check all targets
        run: cargo +1.89.0 check --workspace --all-targets --all-features --locked

      - name: Run all tests
        run: cargo +1.89.0 test --workspace --all-targets --all-features --locked

      - name: Run strict Clippy
        run: cargo +1.89.0 clippy --workspace --all-targets --all-features --locked -- -D warnings

  stable:
    name: Latest stable compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master, 2026-07-16
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: stable

      - run: cargo +stable check --workspace --all-targets --all-features --locked
      - run: cargo +stable test --workspace --all-targets --all-features --locked

  dependency-policy:
    name: Dependency and license policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master, 2026-07-16
        with:
          toolchain: 1.89.0

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: dependency-policy

      - name: Install cargo-audit
        run: cargo +1.89.0 install cargo-audit --locked

      - name: RustSec audit maintained workspace
        run: cargo +1.89.0 audit --file Cargo.lock

      - name: Cargo deny
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Scan changed commits or full history
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
